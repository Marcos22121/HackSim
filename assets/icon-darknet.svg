<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b2ff7"/>
      <stop offset="100%" stop-color="#3a1078"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="2" y="2" width="44" height="44" rx="6" fill="url(#bg)" stroke="#1a0a30" stroke-width="1"/>
  <!-- Globe -->
  <circle cx="24" cy="22" r="14" fill="none" stroke="url(#globe)" stroke-width="2" opacity="0.9"/>
  <!-- Horizontal lines -->
  <ellipse cx="24" cy="22" rx="14" ry="5" fill="none" stroke="#7b2ff7" stroke-width="1" opacity="0.5"/>
  <ellipse cx="24" cy="22" rx="14" ry="10" fill="none" stroke="#7b2ff7" stroke-width="0.7" opacity="0.3"/>
  <!-- Vertical arc -->
  <ellipse cx="24" cy="22" rx="6" ry="14" fill="none" stroke="#7b2ff7" stroke-width="1" opacity="0.5"/>
  <!-- Center vertical line -->
  <line x1="24" y1="8" x2="24" y2="36" stroke="#9945ff" stroke-width="0.7" opacity="0.4"/>
  <!-- Center horizontal line -->
  <line x1="10" y1="22" x2="38" y2="22" stroke="#9945ff" stroke-width="0.7" opacity="0.4"/>
  <!-- Skull hint - eyes -->
  <circle cx="19" cy="20" r="2.5" fill="#ff3366" opacity="0.8"/>
  <circle cx="29" cy="20" r="2.5" fill="#ff3366" opacity="0.8"/>
  <!-- Skull hint - nose -->
  <polygon points="24,23 22.5,26 25.5,26" fill="#ff3366" opacity="0.6"/>
  <!-- Text -->
  <text x="24" y="43" text-anchor="middle" font-family="Arial" font-size="6" font-weight="bold" fill="#9945ff" opacity="0.8">NET</text>
</svg>
